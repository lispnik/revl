name: ci
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: tvlisp (pty smoke)
    runs-on: ubuntu-latest
    steps:
      # lay the three projects out as siblings under common-lisp/, the layout the
      # Makefile's source-registry (:tree ../) and the pty suite expect.
      - name: Checkout tvlisp
        uses: actions/checkout@v4
        with:
          path: common-lisp/tvlisp
      - name: Checkout tvision (framework + tv2 kernel)
        uses: actions/checkout@v4
        with:
          repository: lispnik/tvision
          path: common-lisp/tvision
      - name: Checkout tvision-pty-driver
        uses: actions/checkout@v4
        with:
          repository: lispnik/tvision-pty-driver
          path: common-lisp/tvision-pty-driver

      - name: Install SBCL
        run: sudo apt-get update && sudo apt-get install -y sbcl make git python3

      # Warm path: exact csv match reuses deps; otherwise restore-keys pulls the
      # most recent cache and `ocicl install` fetches only the delta (also
      # cushions ghcr rate limits / hiccups).
      - name: Cache Lisp dependencies
        uses: actions/cache@v4
        with:
          path: |
            common-lisp/tvlisp/systems
            common-lisp/tvision/systems
          key: ocicl-deps-${{ runner.os }}-${{ hashFiles('common-lisp/tvlisp/ocicl.csv', 'common-lisp/tvision/systems.csv') }}
          restore-keys: |
            ocicl-deps-${{ runner.os }}-

      - name: Install ocicl (pinned)
        env:
          OCICL_VERSION: "2.16.14"
        run: |
          curl -fsSL -o /tmp/ocicl.tgz "https://github.com/ocicl/ocicl/releases/download/v${OCICL_VERSION}/ocicl-${OCICL_VERSION}-linux-amd64.tar.gz"
          sudo tar -xzf /tmp/ocicl.tgz -C /usr/local/bin ./ocicl
          ocicl version
          ocicl setup > /dev/null 2>&1 || true

      - name: Restore Lisp dependencies (tvision + tvlisp)
        run: |
          (cd common-lisp/tvision && ocicl install)
          (cd common-lisp/tvlisp  && ocicl install)

      # make test = test-pty: build ./tvlisp (on the tv2 framework) and
      # drive it through a pty with the Lisp-native tvision-pty-driver
      - name: Run tests
        working-directory: common-lisp/tvlisp
        run: make test
